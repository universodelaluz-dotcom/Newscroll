<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsScroll - Ticker caliente</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        background: #020617;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #070d1c, #121b2f);
      }
      .ticker-wrapper {
        position: relative;
        width: min(95vw, 1000px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 0.5rem 1rem;
        overflow: hidden;
        background: rgba(2, 6, 23, 0.85);
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
      }
      .ticker-content {
        display: flex;
        gap: 2rem;
        will-change: transform;
        animation: scroll 24s linear infinite;
      }

      .ticker-content.restart {
        animation: none;
      }

      .ticker-content span {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      .ticker-content span strong {
        color: #facc15;
      }
      .ticker-meta {
        position: absolute;
        right: 16px;
        bottom: 8px;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .sep {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
      }
      @keyframes scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-30%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ticker-content {
          animation: none;
        }
      }
      button {
        position: absolute;
        left: 16px;
        top: 8px;
        padding: 0.3rem 0.8rem;
        border-radius: 999px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="ticker-wrapper">
      <button id="refresh">Actualizar</button>
      <div class="ticker-content" id="ticker">
        <span>Cargando noticias…</span>
      </div>
      <div class="ticker-meta" id="meta">Actualizando…</div>
    </div>
    <script>
      const ticker = document.getElementById('ticker');
      const meta = document.getElementById('meta');
      const refreshBtn = document.getElementById('refresh');

      const buildTicker = (items) => {
        if (!items || items.length === 0) {
          ticker.innerHTML = '<span>No hay noticias disponibles.</span>';
          return;
        }

        ticker.innerHTML = items
          .map((item) => {
            const published = new Date(item.publishedAt);
            const timeAgo = Math.floor((Date.now() - published) / 60000);
            return `<span><strong>${item.source}</strong>${item.title} <span style="color:#a5b4fc;">(${timeAgo}m)</span> <span class="sep">·</span></span>`;
          })
          .join('');

        ticker.classList.remove('restart');
        // force reflow so animation restarts
        void ticker.offsetWidth;
        ticker.classList.add('restart');
      };

      const refresh = async () => {
        try {
          const res = await fetch('/api/news');
          const payload = await res.json();
          buildTicker(payload.items);
          meta.textContent = `Actualizado: ${new Date(payload.updatedAt).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          })}`;
        } catch (error) {
          ticker.innerHTML = '<span>Error conectando con el backend.</span>';
          meta.textContent = 'Último intento fallido';
          console.error(error);
        }
      };

      refreshBtn.addEventListener('click', refresh);
      setInterval(refresh, 45000);
      refresh();
    </script>
  </body>
</html>
