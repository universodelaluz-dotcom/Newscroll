<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsScroll - Ticker caliente</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        background: #020617;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #070d1c, #121b2f);
      }
      .ticker-wrapper {
        position: relative;
        width: min(95vw, 1000px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0;
        padding: 0.6rem 0.9rem;
        overflow: hidden;
        background: rgba(2, 6, 23, 0.95);
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .ticker-content {
        display: inline-flex;
        gap: 2rem;
        will-change: transform;
        white-space: nowrap;
        animation: scroll var(--scroll-duration, 28s) linear infinite;
      }
      .ticker-content span {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      .ticker-content span strong {
        color: #facc15;
      }
      .ticker-meta {
        align-self: flex-end;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .sep {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
      }
      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        padding-top: 0.6rem;
        margin-top: 0.4rem;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
      }
      .speed-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }
      .speed-controls {
        display: inline-flex;
        gap: 0.35rem;
      }
      .speed-controls button {
        width: 40px;
        height: 36px;
        border-radius: 5px;
        border: none;
        background: rgba(250, 204, 21, 0.25);
        color: #facc15;
        font-size: 1.3rem;
        font-weight: 600;
        cursor: pointer;
      }
      .speed-controls button:focus-visible {
        outline: 2px solid #facc15;
      }
      .speed-controls button:active {
        transform: translateY(1px);
      }
      .control-label {
        color: rgba(255, 255, 255, 0.65);
        margin: 0;
      }
      .speed-value {
        color: #a5b4fc;
        font-weight: 600;
      }
      .control-slider input[type='range'] {
        width: 100%;
        accent-color: #facc15;
        cursor: ew-resize;
      }
      @keyframes scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ticker-content {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="ticker-wrapper">
      <div class="ticker-content" id="ticker">
        <span>Cargando noticias…</span>
      </div>
      <div class="ticker-meta" id="meta">Actualizando…</div>
      <div class="control-panel">
        <div class="speed-row">
          <div class="speed-controls">
            <button id="speedDown" aria-label="Más rápido">-</button>
            <button id="speedUp" aria-label="Más lento">+</button>
          </div>
          <div>
            <div class="control-label">Velocidad</div>
            <div id="speedValue" class="speed-value">28s · 2.1 noticias/min</div>
          </div>
        </div>
        <div class="control-slider">
          <input type="range" id="speed" min="12" max="80" value="28" step="1" />
        </div>
      </div>
    </div>
    <script>
      const ticker = document.getElementById('ticker');
      const meta = document.getElementById('meta');
      const speedInput = document.getElementById('speed');
      const speedValue = document.getElementById('speedValue');
      const speedDown = document.getElementById('speedDown');
      const speedUp = document.getElementById('speedUp');
      const MIN_DURATION = 12;
      const MAX_DURATION = 80;
      const BUTTON_STEP = 4;

      const buildTicker = (items) => {
        if (!items || items.length === 0) {
          ticker.innerHTML = '<span>No hay noticias disponibles.</span>';
          return;
        }

        const content = items
          .map((item) => {
            const published = new Date(item.publishedAt);
            const timeAgo = Math.floor((Date.now() - published) / 60000);
            return `<span><strong>${item.source}</strong>${item.title} <span style="color:#a5b4fc;">(${timeAgo}m)</span> <span class="sep">·</span></span>`;
          })
          .join('');

        ticker.innerHTML = content + content;
        ticker.style.animation = 'none';
        void ticker.offsetWidth;
        ticker.style.animation = '';
      };

      const refresh = async () => {
        try {
          const res = await fetch('/api/news');
          const payload = await res.json();
          buildTicker(payload.items);
          meta.textContent = `Actualizado: ${new Date(payload.updatedAt).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          })}`;
        } catch (error) {
          ticker.innerHTML = '<span>Error conectando con el backend.</span>';
          meta.textContent = 'Último intento fallido';
          console.error(error);
        }
      };

      const applyDuration = (value) => {
        const clamped = Math.max(MIN_DURATION, Math.min(MAX_DURATION, value));
        speedInput.value = clamped;
        ticker.style.setProperty('--scroll-duration', `${clamped}s`);
        const pace = (60 / clamped).toFixed(1);
        speedValue.textContent = `${clamped}s · ${pace} noticias/min`;
      };

      const changeDuration = (delta) => {
        applyDuration(Number(speedInput.value) + delta);
      };

      speedInput.addEventListener('input', () => applyDuration(Number(speedInput.value)));
      speedDown.addEventListener('click', () => changeDuration(-BUTTON_STEP));
      speedUp.addEventListener('click', () => changeDuration(BUTTON_STEP));
      applyDuration(Number(speedInput.value));

      setInterval(refresh, 45000);
      refresh();
    </script>
  </body>
</html>
