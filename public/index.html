<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsScroll - Ticker caliente</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        background: #020617;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #070d1c, #121b2f);
      }
      .ticker-wrapper {
        position: relative;
        width: min(95vw, 1000px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0;
        padding: 0.6rem 0.9rem;
        overflow: hidden;
        background: rgba(2, 6, 23, 0.95);
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .ticker-content {
        display: inline-flex;
        gap: 2rem;
        will-change: transform;
        white-space: nowrap;
        animation: scroll var(--scroll-duration, 28s) linear infinite;
      }
      .ticker-content span {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      .ticker-content span strong {
        color: #facc15;
      }
      .ticker-meta {
        align-self: flex-end;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .sep {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
      }
      .control-panel {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        padding-top: 0.5rem;
        margin-top: 0.25rem;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
      }
      .control-label {
        color: rgba(255, 255, 255, 0.65);
        margin-right: 0.25rem;
      }
      .speed-value {
        color: #a5b4fc;
      }
      .control-slider input[type='range'] {
        width: 180px;
        accent-color: #facc15;
        cursor: ew-resize;
      }
      @keyframes scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ticker-content {
          animation: none;
        }
      }
      button {
        position: absolute;
        left: 16px;
        top: 8px;
        padding: 0.3rem 0.8rem;
        border-radius: 999px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="ticker-wrapper">
      <div class="ticker-content" id="ticker">
        <span>Cargando noticias…</span>
      </div>
      <div class="ticker-meta" id="meta">Actualizando…</div>
      <div class="control-panel">
        <div>
          <span class="control-label">Velocidad</span>
          <span id="speedValue" class="speed-value">28s (normal)</span>
        </div>
        <div class="control-slider">
          <input type="range" id="speed" min="18" max="60" value="28" step="1" />
        </div>
      </div>
    </div>
    <script>
      const ticker = document.getElementById('ticker');
      const meta = document.getElementById('meta');
      const speedInput = document.getElementById('speed');
      const speedValue = document.getElementById('speedValue');

      const buildTicker = (items) => {
        if (!items || items.length === 0) {
          ticker.innerHTML = '<span>No hay noticias disponibles.</span>';
          return;
        }

        const content = items
          .map((item) => {
            const published = new Date(item.publishedAt);
            const timeAgo = Math.floor((Date.now() - published) / 60000);
            return `<span><strong>${item.source}</strong>${item.title} <span style="color:#a5b4fc;">(${timeAgo}m)</span> <span class="sep">·</span></span>`;
          })
          .join('');

        ticker.innerHTML = content + content;
        ticker.style.animation = 'none';
        void ticker.offsetWidth;
        ticker.style.animation = '';
      };

      const refresh = async () => {
        try {
          const res = await fetch('/api/news');
          const payload = await res.json();
          buildTicker(payload.items);
          meta.textContent = `Actualizado: ${new Date(payload.updatedAt).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          })}`;
        } catch (error) {
          ticker.innerHTML = '<span>Error conectando con el backend.</span>';
          meta.textContent = 'Último intento fallido';
          console.error(error);
        }
      };

      const updateSpeedDisplay = () => {
        const duration = Number(speedInput.value);
        ticker.style.setProperty('--scroll-duration', `${duration}s`);
        const pace = (60 / duration).toFixed(1);
        speedValue.textContent = `${duration}s · ${pace} noticias/min`;
      };

      speedInput.addEventListener('input', updateSpeedDisplay);
      updateSpeedDisplay();

     setInterval(refresh, 45000);
     refresh();
    </script>
  </body>
</html>
