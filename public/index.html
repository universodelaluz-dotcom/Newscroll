<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsScroll - Ticker caliente</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        background: #020617;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #070d1c, #121b2f);
      }
      .ticker-wrapper {
        position: relative;
        width: min(95vw, 1000px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0;
        padding: 0.6rem 0.9rem;
        overflow: hidden;
        background: rgba(2, 6, 23, 0.95);
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .ticker-content {
        display: inline-flex;
        gap: 2rem;
        will-change: transform;
        white-space: nowrap;
        animation: scroll var(--scroll-duration, 28s) linear infinite;
      }
      .ticker-content span {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      .ticker-content span strong {
        color: #facc15;
      }
      .curation-pill {
        color: #facc15;
      }
      .ticker-meta {
        align-self: flex-end;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .sep {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
      }
      .control-panel {
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        padding-top: 0.6rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
      }
      .speed-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }
      .speed-controls {
        display: inline-flex;
        gap: 0.35rem;
      }
      .speed-controls button {
        width: 40px;
        height: 36px;
        border-radius: 5px;
        border: none;
        background: rgba(250, 204, 21, 0.25);
        color: #facc15;
        font-size: 1.3rem;
        font-weight: 600;
        cursor: pointer;
      }
      .speed-controls button:focus-visible {
        outline: 2px solid #facc15;
      }
      .speed-controls button:active {
        transform: translateY(1px);
      }
      .control-label {
        color: rgba(255, 255, 255, 0.65);
        margin: 0;
      }
      .speed-value {
        color: #a5b4fc;
        font-weight: 600;
      }
      .control-slider input[type='range'] {
        width: 100%;
        accent-color: #facc15;
        cursor: ew-resize;
      }
      .curation-panel {
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 0.8rem;
        background: rgba(250, 204, 21, 0.04);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-row {
        display: flex;
        gap: 0.5rem;
      }
      .curation-panel input {
        flex: 1;
        padding: 0.45rem 0.65rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        border-radius: 3px;
      }
      .curation-panel button {
        border: none;
        background: #facc15;
        color: #0b1220;
        font-weight: 700;
        padding: 0.45rem 0.9rem;
        cursor: pointer;
      }
      .curation-status {
        font-size: 0.75rem;
        color: rgba(248, 250, 252, 0.7);
      }
      .curation-result {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 0.5rem;
        font-size: 0.85rem;
      }
      .curation-result strong {
        display: block;
        color: #facc15;
        font-size: 0.95rem;
        margin-bottom: 0.35rem;
      }
      .curation-result p {
        margin: 0 0 0.35rem;
        color: rgba(248, 250, 252, 0.8);
      }
      .curation-result .curation-urgency {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.1rem 0.6rem;
        border-radius: 999px;
        background: rgba(248, 250, 252, 0.1);
        color: #facc15;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.35rem;
      }
      .curation-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .curation-tags span {
        border-radius: 999px;
        padding: 0.1rem 0.6rem;
        background: rgba(248, 250, 252, 0.1);
        font-size: 0.7rem;
      }
      .curation-list {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      .curation-list:empty {
        display: none;
      }
      .curation-list-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        padding-top: 0.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .curation-list-item strong {
        display: block;
        color: #f8fafc;
        font-size: 0.85rem;
        margin-bottom: 0.2rem;
      }
      .curation-list-item p {
        margin: 0;
        color: rgba(248, 250, 252, 0.65);
        font-size: 0.72rem;
      }
      .remove-web {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: transparent;
        color: #fca5a5;
        padding: 0.3rem 0.55rem;
        cursor: pointer;
        font-size: 0.72rem;
      }
      @keyframes scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ticker-content {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="ticker-wrapper">
      <div class="ticker-content" id="ticker">
        <span>Cargando noticias…</span>
      </div>
      <div class="ticker-meta" id="meta">Actualizando…</div>
      <div class="control-panel">
        <div class="speed-row">
          <div class="speed-controls">
            <button id="speedDown" aria-label="Más rápido">-</button>
            <button id="speedUp" aria-label="Más lento">+</button>
          </div>
          <div>
            <div class="control-label">Velocidad</div>
            <div id="speedValue" class="speed-value">28s · 2.1 noticias/min</div>
          </div>
        </div>
        <div class="control-slider">
          <input type="range" id="speed" min="5" max="120" value="28" step="1" />
        </div>
      </div>
      <div class="curation-panel">
        <form id="curation-form">
          <label class="control-label" for="curation-url">Extraer titulares desde una web</label>
          <div class="form-row">
            <input
              id="curation-url"
              type="url"
              placeholder="https://ejemplo.com/noticia"
              required
            />
            <button type="submit">Extraer de web</button>
          </div>
        </form>
        <div id="curation-status" class="curation-status">
          Pega una URL y te muestro lo más destacado.
        </div>
        <div id="curation-result" class="curation-result"></div>
        <div id="curation-list" class="curation-list"></div>
      </div>
    </div>
    <script>
      const ticker = document.getElementById('ticker');
      const meta = document.getElementById('meta');
      const speedInput = document.getElementById('speed');
      const speedValue = document.getElementById('speedValue');
      const speedDown = document.getElementById('speedDown');
      const speedUp = document.getElementById('speedUp');
      const curationForm = document.getElementById('curation-form');
      const curationUrl = document.getElementById('curation-url');
      const curationStatus = document.getElementById('curation-status');
      const curationResult = document.getElementById('curation-result');
      const curationList = document.getElementById('curation-list');
      const MIN_DURATION = 5;
      const MAX_DURATION = 120;
      const BUTTON_STEP = 10;

      const applyDuration = (value) => {
        const clamped = Math.max(MIN_DURATION, Math.min(MAX_DURATION, value));
        speedInput.value = clamped;
        ticker.style.setProperty('--scroll-duration', `${clamped}s`);
        const pace = (60 / clamped).toFixed(1);
        speedValue.textContent = `${clamped}s ? ${pace} noticias/min`;
      };

      const changeDuration = (delta) => {
        applyDuration(Number(speedInput.value) + delta);
      };

      const buildTickerItem = (item) => {
        const published = new Date(item.publishedAt || Date.now());
        const timeAgo = Math.floor((Date.now() - published) / 60000);
        const isExtracted = (item.source || '').includes('Curaci?n');
        const sourceBlock = isExtracted ? '' : `<strong>${item.source}</strong> `;
        const pill = isExtracted ? 'curation-pill' : '';
        return `<span class="${pill}">${sourceBlock}${item.title} <span style="color:#a5b4fc;">(${timeAgo}m)</span> <span class="sep">?</span></span>`;
      };

      const buildTicker = (items) => {
        if (!items || items.length === 0) {
          ticker.innerHTML = '<span>No hay noticias disponibles.</span>';
          return;
        }

        const content = items.map(buildTickerItem).join('');
        ticker.innerHTML = content + content;
        ticker.style.animation = 'none';
        void ticker.offsetWidth;
        ticker.style.animation = '';
      };

      const refresh = async () => {
        try {
          const res = await fetch(`/api/news?ts=${Date.now()}`, { cache: 'no-store' });
          const payload = await res.json();
          buildTicker(payload.items);
          meta.textContent = `Actualizado: ${new Date(payload.updatedAt).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          })}`;
        } catch (error) {
          ticker.innerHTML = '<span>Error conectando con el backend.</span>';
          meta.textContent = '?ltimo intento fallido';
          console.error(error);
        }
      };

      const showCuration = (curation) => {
        if (!curation) {
          curationResult.innerHTML = '';
          return;
        }
        const highlights = (curation.highlights || []).slice(0, 3);
        const urgencyBadge = curation.urgency
          ? `<span class="curation-urgency">${curation.urgency.toUpperCase()}</span>`
          : '';
        const tagHtml = (curation.tags || [])
          .slice(0, 6)
          .map((tag) => `<span>${tag}</span>`)
          .join('');
        curationResult.innerHTML = `
          ${urgencyBadge}
          <strong>${curation.title}</strong>
          <p>${curation.summary}</p>
          ${highlights.map((item) => `<p>${item}</p>`).join('')}
          <div class="curation-tags">${tagHtml}</div>
        `;
      };

      const renderCurations = (items) => {
        if (!items || items.length === 0) {
          curationList.innerHTML = '';
          return;
        }

        curationList.innerHTML = items
          .map((item) => {
            const preview = [...(item.headlines || []), ...(item.highlights || [])]
              .filter(Boolean)
              .slice(0, 2)
              .join(' ? ');
            return `
              <div class="curation-list-item">
                <div>
                  <strong>${item.title}</strong>
                  <p>${item.url}</p>
                  <p>${preview || 'Titulares listos para la barra.'}</p>
                </div>
                <button class="remove-web" data-url="${item.url}">Quitar</button>
              </div>
            `;
          })
          .join('');
      };

      const refreshCurations = async () => {
        try {
          const response = await fetch(`/api/curations?ts=${Date.now()}`, { cache: 'no-store' });
          const payload = await response.json();
          renderCurations(payload.items || []);
        } catch (error) {
          console.error('No se pudo refrescar la lista de webs:', error);
        }
      };

      curationForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const url = curationUrl.value.trim();
        if (!url) {
          return;
        }
        curationStatus.textContent = 'Extrayendo titulares de la web...';
        try {
          const response = await fetch('/api/curate', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            cache: 'no-store',
            body: JSON.stringify({ url })
          });
          if (!response.ok) {
            const errorPayload = await response.json().catch(() => ({}));
            throw new Error(errorPayload.error || 'No se pudo extraer la URL.');
          }
          const { curated } = await response.json();
          showCuration(curated);
          curationStatus.textContent = 'Web agregada a la barra.';
          curationUrl.value = '';
          await Promise.all([refreshCurations(), refresh()]);
        } catch (error) {
          console.error('Extracci?n fallida:', error);
          curationStatus.textContent = `Error: ${error.message}`;
        }
      });

      curationList.addEventListener('click', async (event) => {
        const button = event.target.closest('.remove-web');
        if (!button) {
          return;
        }

        const { url } = button.dataset;
        if (!url) {
          return;
        }

        curationStatus.textContent = 'Quitando web de la barra...';
        try {
          const response = await fetch('/api/curate', {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json'
            },
            cache: 'no-store',
            body: JSON.stringify({ url })
          });
          if (!response.ok) {
            const errorPayload = await response.json().catch(() => ({}));
            throw new Error(errorPayload.error || 'No se pudo quitar la web.');
          }
          curationStatus.textContent = 'Web quitada de la barra.';
          await Promise.all([refreshCurations(), refresh()]);
        } catch (error) {
          console.error('No se pudo quitar la web:', error);
          curationStatus.textContent = `Error: ${error.message}`;
        }
      });

      speedInput.addEventListener('input', () => applyDuration(Number(speedInput.value)));
      speedDown.addEventListener('click', () => changeDuration(-BUTTON_STEP));
      speedUp.addEventListener('click', () => changeDuration(BUTTON_STEP));
      applyDuration(Number(speedInput.value));

      setInterval(refresh, 45000);
      refresh();
      refreshCurations();
    </script>
  </body>
</html>
